    <!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Programa de Productos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="titulazo">
        <h2>Inventario</h2>
    </div>
    <div class="buscador">
        <input type="text" id="buscador-stock" placeholder="Buscar producto por nombre...">   
    </div>
    
    <div class="inventario">
        
    </div>
    
    <div class="bottom-menu">
        <a href="inventario.html">
            <button class="seleccion">
                <i class="fa-solid fa-box"></i> </button>
        </a>
        <a href="index.html">
            <button>
                <i class="fa-solid fa-plus"></i>
            </button>
        </a>
        <a href="ticket.html">
            <button>
                <i class="fa-solid fa-ticket"></i>
            </button>
        </a>
    </div>

    <script src="jquery.js"></script>
    <script>
        $('#buscador-stock').on('keyup', function() {
    let textoBusqueda = $(this).val().toLowerCase();

    $('.inventario .item-producto').each(function() {
        
        let nombreProducto = $(this).find('span').text().toLowerCase();

        
        if (nombreProducto.indexOf(textoBusqueda) !== -1) {
            $(this).show();
        } else {
            $(this).hide();
        }
    });
});
    </script>
</body>
</html>
